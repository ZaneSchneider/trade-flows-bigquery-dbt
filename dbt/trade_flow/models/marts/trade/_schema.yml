models:
  - name: mart_import_export_by_product_country
    description: >
      Country × product × year specialization base. Grain = one row per
      (iso3, hs6_product_code, year). Exports are aggregated by exporter and
      imports by importer from fct_trade, then full-outer-joined, so a country
      appears for a product even when it only trades it on one side. Feeds the
      downstream analytical marts.
    columns:

      - name: iso3
        description: Country ISO3 (resolved upstream in fct_trade via dim_country).
        tests:
          - not_null
          - relationships:
              arguments: {to: ref('dim_country'), field: iso3}

      - name: hs6_product_code
        description: HS6 product code.
        tests:
          - not_null
          - relationships:
              arguments: {to: ref('dim_product'), field: hs6_product_code}

      - name: year
        description: Trade year.
        tests: [not_null]

      - name: export_value_thousands_usd
        description: Country's total exports of this product this year (thousands USD); null if no export flow.

      - name: export_quantity_metric_tons
        description: Export quantity (metric tons); partial — BACI omits quantity on many rows.

      - name: import_value_thousands_usd
        description: Country's total imports of this product this year (thousands USD); null if no import flow.

      - name: import_quantity_metric_tons
        description: Import quantity (metric tons); partial — BACI omits quantity on many rows.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [iso3, hs6_product_code, year]


  - name: mart_import_export_by_country
    description: >
      Canonical country fact. Grain = one row per (iso3, year). Rolled up from
      mart_country_product_year by summing exports and imports across all
      products (additive measures, so the re-aggregation is valid). Partner and
      product are both collapsed; quantity is intentionally dropped.
    columns:

      - name: iso3
        description: Country ISO3.
        tests:
          - not_null
          - relationships:
              arguments: {to: ref('dim_country'), field: iso3}

      - name: year
        description: Trade year.
        tests: [not_null]

      - name: export_value_thousands_usd
        description: Total exports across all products this year (thousands USD); 0 if none.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0, inclusive: true}

      - name: import_value_thousands_usd
        description: Total imports across all products this year (thousands USD); 0 if none.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0, inclusive: true}

      - name: trade_balance_thousands_usd
        description: Exports minus imports (thousands USD); negative = net importer. Signed, so no range test.
        tests: [not_null]

      - name: country_name
        description: Country name, deduped to one per iso3 from dim_country.
        tests: [not_null]

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [iso3, year]


  - name: mart_global_export_by_product
    description: >
      World product fact. Grain = one row per (hs6_product_code, year). Rolled up
      from mart_import_export_by_product_country by summing across all countries.
      Exports and imports are identical at world scale (each flow is counted once
      on each side and BACI reconciles flows to a single value), so one world
      trade_value is reported instead of redundant export/import columns.
    columns:

      - name: hs6_product_code
        description: HS6 product code.
        tests:
          - not_null
          - relationships:
              arguments: {to: ref('dim_product'), field: hs6_product_code}

      - name: year
        description: Trade year.
        tests: [not_null]

      - name: product_description
        description: HS6 description, denormalized from dim_product (unique key, no fan-out).
        tests: [not_null]

      - name: trade_value_thousands_usd
        description: Total world trade of this product this year (thousands USD) = sum of all bilateral flows.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0, inclusive: false}

      - name: trade_quantity_metric_tons
        description: World quantity (metric tons); nullable and partial — BACI omits quantity on many flows.
        
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [hs6_product_code, year]